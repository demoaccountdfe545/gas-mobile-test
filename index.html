<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAS Mobile Test</title>
</head>
<body>
  <h2>GAS Mobile Test</h2>
  <button onclick="testGAS()">Tap to Test</button>
  <p id="result">Result will show here...</p>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwIoU7NtB1GIK-aj9Jafb-MZt75UFWggBQ_xjUkPjud46KSLPQ3WqgCrM6nzf4KGL3zrA/exec";

    async function testGAS() {
      document.getElementById("result").innerText = "Loading...";
      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        document.getElementById("result").innerText = data.message;
      } catch (err) {
        document.getElementById("result").innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
